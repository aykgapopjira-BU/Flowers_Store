<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มหมวดหมู่ - BU-Flower Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'purple-primary': '#7C3AED',
                        'purple-secondary': '#A855F7',
                        'orange-primary': '#F97316',
                        'orange-secondary': '#FB923C'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-orange-50 min-h-screen">
    <header class="bg-gradient-to-r from-purple-primary to-orange-primary shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold text-white">เพิ่มหมวดหมู่</h1>
                <a href="{{ url_for('index') }}" class="bg-white text-purple-primary px-4 py-2 rounded-lg hover:bg-purple-50 transition duration-300">กลับหน้าหลัก</a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
            <form method="POST" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">ชื่อหมวดหมู่</label>
                    <input type="text" id="name" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-primary">
                </div>
                <div class="flex space-x-4">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-purple-primary to-orange-primary text-white py-2 px-4 rounded-lg hover:from-purple-secondary hover:to-orange-secondary transition duration-300">เพิ่มหมวดหมู่</button>
                    <a href="{{ url_for('categories') }}" class="flex-1 bg-gray-500 text-white py-2 px-4 rounded-lg text-center hover:bg-gray-600 transition duration-300">ยกเลิก</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
